<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minibo Developer Portal</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="shell">
      <section class="hero">
        <p class="eyebrow">Minibo Systems</p>
        <h1>Developer Portal</h1>
        <p class="sub">
          بوابة مطورين محلية لإصدار ملفات الحسابات الموقعة. كل مستخدم يخرج له ملف JSON مستقل خاص به.
        </p>
      </section>

      <section class="panel">
        <div class="tabs">
          <button class="tab is-active" data-kind="bootstrap">Bootstrap Account</button>
          <button class="tab" data-kind="user">User Account</button>
        </div>

        <form id="account-form" class="form-grid">
          <input type="hidden" id="packageKind" value="bootstrap" />
          <label>
            <span>اسم المستخدم</span>
            <input id="username" value="admin" required />
          </label>
          <label>
            <span>الاسم الظاهر</span>
            <input id="displayName" value="Primary Administrator" required />
          </label>
          <label>
            <span>كلمة المرور الأولية</span>
            <input id="password" value="1234" required />
          </label>
          <label>
            <span>Target Instance</span>
            <input id="targetInstance" value="*" required />
          </label>
          <label>
            <span>مدة الصلاحية بالأيام</span>
            <input id="expiresDays" type="number" value="7" min="1" required />
          </label>
          <label>
            <span>اسم المشغل</span>
            <input id="operator" value="Developer Portal" />
          </label>
          <label class="wide">
            <span>Roles</span>
            <input id="roles" value="SuperAdmin" />
          </label>
          <label class="wide">
            <span>Permissions</span>
            <input id="permissions" value="*" />
          </label>
          <label class="wide">
            <span>توقيع SVG اختياري</span>
            <textarea id="signatureSvg" rows="4"></textarea>
          </label>
          <div class="actions wide">
            <button type="submit">إنشاء الملف</button>
          </div>
        </form>

        <div id="status" class="status"></div>
        <pre id="output" class="output"></pre>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
